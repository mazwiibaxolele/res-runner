<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#F8FAFC" stroke="#16A34A" stroke-width="4"/>

  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B426B"/>
      <stop offset="100%" stop-color="#155D93"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E9B772"/>
      <stop offset="100%" stop-color="#C48E44"/>
    </linearGradient>
  </defs>

  <!-- Speed lines (Green) -->
  <line x1="22" y1="36" x2="42" y2="36" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="42" x2="38" y2="42" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="48" x2="34" y2="48" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>

  <!-- Runner body -->
  <!-- Back arm -->
  <path d="M46 40 L33 34 C29 32, 26 36, 28 40 L36 48" stroke="url(#rg)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Back leg -->
  <path d="M42 54 L24 62 C18 64, 16 70, 22 72 L30 68" stroke="url(#rg)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Torso -->
  <path d="M50 40 C52 44, 46 50, 42 54" stroke="url(#rg)" stroke-width="10.5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="62" cy="28" r="7" fill="url(#rg)"/>
  <!-- Front leg -->
  <path d="M42 54 L56 58 C61 60, 60 66, 56 72 L53 78" stroke="url(#rg)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Front arm -->
  <path d="M50 40 L63 44" stroke="url(#rg)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M63 44 L71 42" stroke="url(#rg)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Shopping Bag -->
  <path d="M70 42 C70 38, 74 38, 74 42" stroke="#A77A42" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M67 43 H77 L79 54 C79 56, 77 57, 75 57 H69 C67 57, 65 56, 65 54 Z" fill="url(#bg)" stroke="#A37130" stroke-width="1.2" stroke-linejoin="round"/>
